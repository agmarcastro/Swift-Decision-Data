anthropic:
  model: claude-sonnet-4-6
  max_tokens: 4096
  temperature: 0.0

qdrant:
  host: qdrant
  port: 6333
  collections:
    - infoagent_knowledge
    - reviews
  top_k: 3

langfuse:
  host: ${LANGFUSE_HOST:-http://langfuse:3000}
  public_key: ${LANGFUSE_PUBLIC_KEY}
  secret_key: ${LANGFUSE_SECRET_KEY}

deepeval:
  judge_model: claude-sonnet-4-6
  threshold: 0.7

shadowtraffic:
  output_dir: /tmp/shadowtraffic
  seed_counts:
    fato_vendas: 100000
    fato_estoque: 60000
    reviews: 12000

database:
  host: postgres
  port: 5432
  name: infoagent
  readonly_user: infoagent_readonly
