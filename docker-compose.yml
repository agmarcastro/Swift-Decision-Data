version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — Star Schema DB
  # Credentials align with .env.example: admin user for DDL/seed, readonly for app
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-infoagent}
      POSTGRES_USER: ${POSTGRES_USER:-infoagent_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ingest/sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./ingest/sql/create_readonly_user.sql:/docker-entrypoint-initdb.d/02_readonly.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-infoagent_admin} -d ${POSTGRES_DB:-infoagent}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Qdrant — Vector Store
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # ShadowTraffic — Synthetic data generator
  # Runs 3 configs in strict FK order: dims → fato_vendas → fato_estoque
  # Uses shell entrypoint so all three passes run inside a single container
  # ---------------------------------------------------------------------------
  shadowtraffic:
    image: shadowtraffic/shadowtraffic:latest
    environment:
      LICENSE_ACCEPTED: "true"
    volumes:
      - ./ingest/shadowtraffic:/configs
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "==> [1/3] Seeding dimension tables..."
        /app/shadowtraffic --config /configs/dims.json --sample 100 --exit-at-end
        echo "==> [2/3] Seeding fato_vendas..."
        /app/shadowtraffic --config /configs/fato_vendas.json --sample 100000 --exit-at-end
        echo "==> [3/3] Seeding fato_estoque..."
        /app/shadowtraffic --config /configs/fato_estoque.json --sample 60000 --exit-at-end
        echo "==> ShadowTraffic seeding complete."
    restart: "no"

  # ---------------------------------------------------------------------------
  # Seed validation — runs after ShadowTraffic to assert row counts
  # ---------------------------------------------------------------------------
  seed:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "ingest.loaders.seed"]
    environment:
      POSTGRES_ADMIN_URL: postgresql://${POSTGRES_USER:-infoagent_admin}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-infoagent}
    depends_on:
      shadowtraffic:
        condition: service_completed_successfully
    restart: "no"

  # ---------------------------------------------------------------------------
  # Qdrant ingest — one-shot seeding of the vector store
  # ---------------------------------------------------------------------------
  qdrant-ingest:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "contextualize.qdrant_ingest.ingest"]
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      QDRANT_COLLECTION: infoagent_knowledge
    depends_on:
      qdrant:
        condition: service_healthy
    restart: "no"

  # ---------------------------------------------------------------------------
  # App — Chainlit executive UI
  # Connects to PostgreSQL as readonly user; no MCP server dependency
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      POSTGRES_READONLY_URL: postgresql://infoagent_readonly:${POSTGRES_READONLY_PASSWORD:-readonly_changeme}@postgres:5432/${POSTGRES_DB:-infoagent}
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      QDRANT_COLLECTION: infoagent_knowledge
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      qdrant-ingest:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
